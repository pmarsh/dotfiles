##### Terminal #####
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g focus-events on
set -g escape-time 0

##### History #####
set -g history-limit 100000

##### Mouse #####
set -g mouse on

##### Prefix #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### Splits #####
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

##### Pane navigation #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Resize panes #####
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Windows #####
set -g base-index 1
setw -g pane-base-index 1
bind c new-window
bind r command-prompt -I "#W" "rename-window '%%'"

##### Copy mode (WSL → Windows clipboard) #####
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"

##### Status bar #####
set -g status-interval 5
set -g status-style fg=colour250,bg=colour234
set -g status-left "#[fg=colour39] #S #[default]"
set -g status-right "#[fg=colour244]%Y-%m-%d %H:%M#[default]"

setw -g window-status-current-style fg=colour231,bg=colour33
setw -g window-status-current-format " #I:#W "

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

